name: Release Recipes

on:
  push:
    branches: [master]
    paths:
      - 'recipes/**'

permissions:
  contents: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build index and validate schemas
        run: go run scripts/build-index.go

      - name: Package recipes
        run: tar -czf recipes.tar.gz recipes/

      - name: Upload recipes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: recipes-latest
          make_latest: false
          files: |
            recipes-index.json
            recipes.tar.gz
          body: |
            Auto-published recipe registry.

            - `recipes-index.json` — recipe index for remote fetching
            - `recipes.tar.gz` — all recipe YAML files
