name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Copy recipes to embed
        run: |
          rm -rf internal/recipe/embedded/*
          cp -r recipes/* internal/recipe/embedded/

      - name: Build macOS arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o yduck-darwin-arm64 ./cmd/yduck/

      - name: Build macOS amd64
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o yduck-darwin-amd64 ./cmd/yduck/

      - name: Generate checksums
        run: shasum -a 256 yduck-darwin-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            yduck-darwin-arm64
            yduck-darwin-amd64
            checksums.txt
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release binaries
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern 'yduck-darwin-*' \
            --dir dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256
        id: sha
        run: |
          echo "arm64=$(shasum -a 256 dist/yduck-darwin-arm64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "amd64=$(shasum -a 256 dist/yduck-darwin-amd64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          sed -e "s/\${VERSION}/${{ steps.version.outputs.tag }}/g" \
              -e "s/\${SHA256_ARM64}/${{ steps.sha.outputs.arm64 }}/g" \
              -e "s/\${SHA256_AMD64}/${{ steps.sha.outputs.amd64 }}/g" \
              Formula/yduck.rb > yduck.rb

      - name: Push to Homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/tc6-01/homebrew-yduck.git tap
          mkdir -p tap/Formula
          cp yduck.rb tap/Formula/yduck.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/yduck.rb
          git commit -m "yduck ${{ github.ref_name }}" || exit 0
          git push
