name: Release CLI

on:
  push:
    branches: [master]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'recipes/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Determine version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="0.1.${COMMIT_COUNT}"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy recipes to embed
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          rm -rf internal/recipe/embedded/*
          cp -r recipes/* internal/recipe/embedded/

      - name: Build macOS arm64
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" -o yduck-darwin-arm64 ./cmd/yduck/

      - name: Build macOS amd64
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" -o yduck-darwin-amd64 ./cmd/yduck/

      - name: Generate checksums
        if: steps.check_tag.outputs.exists == 'false'
        run: shasum -a 256 yduck-darwin-* > checksums.txt

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: YangDuck ${{ steps.version.outputs.tag }}
          draft: false
          files: |
            yduck-darwin-arm64
            yduck-darwin-amd64
            checksums.txt
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="0.1.${COMMIT_COUNT}"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download release binaries
        run: |
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern 'yduck-darwin-*' \
            --dir dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256
        id: sha
        run: |
          echo "arm64=$(shasum -a 256 dist/yduck-darwin-arm64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "amd64=$(shasum -a 256 dist/yduck-darwin-amd64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          sed -e "s/\${VERSION}/${{ steps.version.outputs.version }}/g" \
              -e "s/\${SHA256_ARM64}/${{ steps.sha.outputs.arm64 }}/g" \
              -e "s/\${SHA256_AMD64}/${{ steps.sha.outputs.amd64 }}/g" \
              Formula/yduck.rb > yduck.rb

      - name: Push to Homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/tc6-01/homebrew-yduck.git tap
          mkdir -p tap/Formula
          cp yduck.rb tap/Formula/yduck.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/yduck.rb
          git commit -m "yduck ${{ steps.version.outputs.tag }}" || exit 0
          git push
